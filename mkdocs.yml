site_name: Protumentació
site_description: Documentació per prototipar
site_author: Jorge Muñoz Zanón
site_url: https://jmuozan.github.io/protumentation/

theme:
  name: material
  language: ca
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Canvia a mode fosc
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Canvia a mode clar
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

repo_name: jmuozan/protumentation
repo_url: https://github.com/jmuozan/protumentation

nav:
  - Inici: index.md
  - Temaris:
    - Mòdul 1. Metrologia i normalització: temaris/1_metrologia.md
    - Mòdul 2. Processos d'emmotlament i fosa: temaris/2_motlles.md
    - Mòdul 3. Conformació de materials: temaris/3_conformacio.md
    - Mòdul 4. Processos d'unió: temaris/4_unio.md
    - Mòdul 5. Processos de mecanització i control numèric: temaris/5_cnc.md
    - Mòdul 6. Fabricació additiva: temaris/6_additiva.md
    - Mòdul 7. Enginyeria inversa: temaris/7_enginversa.md
    - Mòdul 8. Informàtica aplicada CAD: temaris/8_cad.md
    - Mòdul 9. Seguretat i salut: temaris/9_seguretat.md
    - Mòdul 10. Control de qualitat i gestió de laboratori: temaris/10_qualitat.md
  - Bibliografia: bibliografia.md

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: ca

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jmuozan
