site_name: Temaris Oposicions
site_description: Materials per a les oposicions d'Arts Plàstiques i Disseny
site_author: Jorge Muyo
site_url: https://jmuozan.github.io/motles_i_reproduccions/

theme:
  name: material
  language: ca
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Canvia a mode fosc
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Canvia a mode clar
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

repo_name: jmuozan/motles_i_reproduccions
repo_url: https://github.com/jmuozan/motles_i_reproduccions

nav:
  - Inici: index.md
  - Temaris:
    - Mòdul 1. Metrologia i normalització: temaris/ceramica_i_vidre.md
    - Mòdul 2. Processos d'emmotlament i fosa: temaris/dibuix_tecnic.md
    - Mòdul 3. Conformació de materials: temaris/disseny.md
    - Mòdul 4. Processos d'unió: temaris/disseny_de_producte.md
    - Mòdul 5. Processos de mecanització i control numèric: temaris/modelisme_i_maquetisme.md
    - Mòdul 6. Fabricació additiva: temaris/motles_i_reproduccions.md
    - Mòdul 7. Enginyeria inversa: temaris/volum.md
    - Mòdul 8. Ofimàtica i informàtica aplicada: 
    - Mòdul 9. Seguretat i salut:
    - Mòdul 10. Control de qualitat i gestió de laboratori:
  - Bibliografia: bibliografia.md

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: ca

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jmuozan
